services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # The database is reachable by the api over the internal compose network.
    # To inspect it from the host, uncomment and pick a free host port, e.g.:
    # ports:
    #   - "127.0.0.1:5433:5432"

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      CLIENT_URL: ${CLIENT_URL}
      PORT: ${PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      REMINDER_LEAD_HOURS: ${REMINDER_LEAD_HOURS}
      NODE_ENV: production
    expose:
      - "${PORT}"

  web:
    build:
      context: ./client
      args:
        # Frontend calls the API at a relative /api path, proxied by nginx.
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:80"

volumes:
  pgdata:
